<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff1f2"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#fff7ed"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb7185"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#fda4af" opacity="0.12"/>
  <circle cx="1100" cy="530" r="180" fill="#fed7aa" opacity="0.15"/>
  <circle cx="1050" cy="80" r="120" fill="#fda4af" opacity="0.08"/>

  <!-- Icon circle -->
  <circle cx="180" cy="315" r="90" fill="url(#iconGrad)"/>

  <!-- Letter G inside circle (white) -->
  <text x="180" y="355" font-family="Georgia, serif" font-size="96" font-weight="700" fill="white" text-anchor="middle">G</text>

  <!-- Vertical divider -->
  <rect x="310" y="215" width="2" height="200" fill="#fda4af" rx="1"/>

  <!-- Business Name -->
  <text x="360" y="278" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#1c1917" letter-spacing="-1">Glow</text>
  <text x="360" y="360" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="400" fill="#44403c" letter-spacing="0">Beauty Salon</text>

  <!-- Tagline -->
  <text x="360" y="420" font-family="Arial, sans-serif" font-size="28" font-weight="300" fill="#a8a29e" letter-spacing="3">LOOK GOOD  ·  FEEL CONFIDENT</text>

  <!-- Bottom pill badge -->
  <rect x="360" y="455" width="300" height="44" rx="22" fill="#fff1f2" stroke="#fda4af" stroke-width="1.5"/>
  <text x="510" y="483" font-family="Arial, sans-serif" font-size="20" fill="#e11d48" text-anchor="middle" letter-spacing="1">🌸 Mumbai</text>
</svg>
